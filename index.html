        function write(text, i, cb) {
            if(i < (text.length)) {
                document.querySelector("p").innerHTML = replace(text.substring(0, i+1));
                setTimeout(function() {
                    write(text, i+1, cb)
                }, 25);
            }
            else if(typeof cb == 'function') {}
        }

        function replace(text) {
            text = text.replace(/\t/g, '<span class="spacer"></span>')
            return text.replace(/\n/g, '<br>');
        }

        function animate(i) {
            if(typeof text[i] == 'undefined') {
                setTimeout(function() {
                    animate(0);
                }, 1000000);
            }
            if(i < text[i].length) {
                write(text[i], 0, function() {
                    animate(i+1);
                })
            }
        }
        animate(0);
